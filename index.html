<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>Todo Pro UI</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>
<body class="bg-gray-100">

<div class="max-w-4xl mx-auto p-5">

    <h1 class="text-3xl font-bold text-center mb-6 text-blue-600">
        🚀 Todo App Pro
    </h1>

    <!-- USER -->
    <div class="bg-white p-4 rounded-xl shadow mb-4">
        <h2 class="font-semibold mb-2">User qo‘shish</h2>
        <input id="first_name" placeholder="Ism" class="border p-2 w-full mb-2 rounded">
        <input id="last_name" placeholder="Familiya" class="border p-2 w-full mb-2 rounded">
        <button onclick="addUser()" class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">
            Qo‘shish
        </button>
    </div>

    <!-- TODO -->
    <div class="bg-white p-4 rounded-xl shadow mb-4">
        <h2 class="font-semibold mb-2">Todo qo‘shish</h2>
        <input id="todo_name" placeholder="Nomi" class="border p-2 w-full mb-2 rounded">
        <input id="todo_desc" placeholder="Tavsif" class="border p-2 w-full mb-2 rounded">
        <select id="userSelect" class="border p-2 w-full mb-2 rounded"></select>
        <button onclick="addTodo()" class="bg-green-500 text-white px-4 py-2 rounded hover:bg-green-600">
            Qo‘shish
        </button>
    </div>

    <!-- LIST -->
    <div id="list" class="space-y-4"></div>

</div>

<script>
const API = "http://127.0.0.1:8000/api";

async function load() {
    const res = await fetch(API + "/users/");
    const users = await res.json();

    list.innerHTML = "";
    userSelect.innerHTML = "<option value=''>User tanlang</option>";

    users.forEach(u => {

        userSelect.innerHTML += `<option value="${u.id}">
            ${u.first_name} ${u.last_name}
        </option>`;

        let html = `
        <div class="bg-white p-4 rounded-xl shadow hover:shadow-lg transition">
            <div class="flex justify-between items-center mb-2">
                <h3 class="font-bold text-lg">${u.first_name} ${u.last_name}</h3>
                <button onclick="deleteUser(${u.id})" class="text-red-500">❌</button>
            </div>
        `;

        if (u.todos.length === 0) {
            html += `<p class="text-gray-400">Todo yo‘q</p>`;
        }

        u.todos.forEach(t => {
            html += `
            <div class="flex justify-between items-center bg-gray-50 p-2 rounded mb-2">
                <span class="${t.is_completed ? 'line-through text-gray-400' : ''}">
                    ${t.name} - ${t.description}
                </span>

                <div>
                    <button onclick="toggle(${t.id}, '${t.name}', '${t.description}', ${!t.is_completed})"
                        class="bg-green-500 text-white px-2 py-1 rounded text-sm">
                        ✔
                    </button>

                    <button onclick="deleteTodo(${t.id})"
                        class="bg-red-500 text-white px-2 py-1 rounded text-sm">
                        🗑
                    </button>
                </div>
            </div>`;
        });

        html += `</div>`;
        list.innerHTML += html;
    });
}

async function addUser() {
    await fetch(API + "/users/", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
            first_name: first_name.value,
            last_name: last_name.value
        })
    });
    load();
}

async function addTodo() {
    await fetch(API + "/todos/", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
            name: todo_name.value,
            description: todo_desc.value,
            user_id: Number(userSelect.value)
        })
    });
    load();
}

async function deleteUser(id){
    await fetch(API + "/users/" + id, {method:"DELETE"});
    load();
}

async function deleteTodo(id){
    await fetch(API + "/todos/" + id, {method:"DELETE"});
    load();
}

async function toggle(id, name, description, status){
    await fetch(API + "/todos/" + id, {
        method:"PUT",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({name, description, is_completed: status})
    });
    load();
}

load();
</script>

</body>
</html>
