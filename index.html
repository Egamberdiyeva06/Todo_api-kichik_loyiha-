<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Vazifalar — Todo App</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0d0d0f; --surface: #141417; --surface2: #1c1c21; --border: #2a2a32;
    --accent: #b9ff66; --accent-glow: rgba(185,255,102,0.12);
    --text: #e8e8ec; --text-muted: #6b6b7a; --red: #ff5e5e; --orange: #ffaa44; --blue: #66b3ff;
  }
  body { font-family: 'DM Mono', monospace; background: var(--bg); color: var(--text); margin: 0; }
  .hidden { display: none !important; }
  
  /* Auth Styles */
  #auth-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 1000; }
  .auth-card { background: var(--surface); border: 1px solid var(--border); padding: 40px; border-radius: 20px; width: 100%; max-width: 400px; }
  
  /* App Styles */
  #app { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
  .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
  .topbar h1 { font-family: 'Syne', sans-serif; color: var(--accent); }

  /* Input Section */
  .add-box { background: var(--surface); border: 1px solid var(--border); padding: 25px; border-radius: 15px; margin-bottom: 30px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
  .full { grid-column: 1 / -1; }
  input, select { background: var(--surface2); border: 1px solid var(--border); color: white; padding: 12px; border-radius: 8px; font-family: inherit; }
  button { cursor: pointer; border-radius: 8px; font-weight: bold; font-family: 'Syne', sans-serif; transition: 0.3s; }
  .btn-main { background: var(--accent); color: black; border: none; padding: 12px; }
  .btn-main:hover { opacity: 0.8; }

  /* Todo Card */
  .todo-card { background: var(--surface); border: 1px solid var(--border); padding: 18px; border-radius: 12px; margin-bottom: 12px; display: flex; align-items: center; gap: 15px; position: relative; overflow: hidden; }
  .prio-line { position: absolute; left: 0; top: 0; bottom: 0; width: 4px; }
  .high { background: var(--red); }
  .medium { background: var(--orange); }
  .low { background: var(--blue); }
  
  .time-tag { font-size: 11px; color: var(--text-muted); display: block; margin-top: 5px; }
  .deadline-tag { font-size: 10px; background: rgba(255,255,255,0.05); padding: 2px 6px; border-radius: 4px; color: var(--orange); }
  
  .loader { width: 16px; height: 16px; border: 2px solid #000; border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="auth-screen">
  <div class="auth-card">
    <h2 id="auth-title" style="margin-bottom: 20px; font-family: 'Syne'">Kirish</h2>
    <div id="login-form">
      <input type="text" id="l-user" placeholder="Username" style="width:100%; margin-bottom:10px">
      <input type="password" id="l-pass" placeholder="Parol" style="width:100%; margin-bottom:15px">
      <button class="btn-main" onclick="handleLogin()" style="width:100%">Kirish</button>
      <p style="font-size:12px; margin-top:15px; cursor:pointer" onclick="toggleAuth(true)">Ro'yxatdan o'tish</p>
    </div>
    <div id="reg-form" class="hidden">
      <input type="text" id="r-first" placeholder="Ism" style="width:100%; margin-bottom:10px">
      <input type="text" id="r-user" placeholder="Username" style="width:100%; margin-bottom:10px">
      <input type="password" id="r-pass" placeholder="Parol" style="width:100%; margin-bottom:15px">
      <button class="btn-main" onclick="handleRegister()" style="width:100%">Yaratish</button>
      <p style="font-size:12px; margin-top:15px; cursor:pointer" onclick="toggleAuth(false)">Kirishga qaytish</p>
    </div>
  </div>
</div>

<div id="app" class="hidden">
  <div class="topbar">
    <h1>TODO/App</h1>
    <div>
      <span id="user-display" style="margin-right:15px; font-size:13px"></span>
      <button onclick="logout()" style="background:none; border:1px solid var(--border); color:var(--red); padding:5px 10px">Chiqish</button>
    </div>
  </div>

  <div class="add-box">
    <input type="text" id="t-name" class="full" placeholder="Vazifa nomi...">
    <select id="t-prio">
      <option value="low">Past</option>
      <option value="medium" selected>O'rta</option>
      <option value="high">Yuqori</option>
    </select>
    <input type="date" id="t-date">
    <button class="btn-main full" onclick="addTodo()">Vazifani saqlash</button>
  </div>

  <div id="todo-list"></div>
</div>

<script>
  const API = "http://127.0.0.1:8000/api";
  let token = localStorage.getItem('todo_token');

  // --- VAQTNI FORMATLASH ---
  function formatTime(isoString) {
    if (!isoString) return "";
    const date = new Date(isoString);
    return date.toLocaleString('uz-UZ', { 
        day: '2-digit', month: 'long', hour: '2-digit', minute: '2-digit' 
    });
  }

  // --- API CHAQIRUV ---
  async function call(url, method = 'GET', data = null, isForm = false) {
    const headers = {};
    if (token) headers['Authorization'] = `Bearer ${token}`;
    if (!isForm && data) headers['Content-Type'] = 'application/json';

    const opts = { method, headers };
    if (data) opts.body = isForm ? data : JSON.stringify(data);

    const res = await fetch(API + url, opts);
    const result = await res.json();
    if (!res.ok) throw new Error(result.detail || "Xatolik");
    return result;
  }

  function toggleAuth(reg) {
    document.getElementById('login-form').classList.toggle('hidden', reg);
    document.getElementById('reg-form').classList.toggle('hidden', !reg);
    document.getElementById('auth-title').innerText = reg ? "Ro'yxatdan o'tish" : "Kirish";
  }

  async function handleLogin() {
    const u = document.getElementById('l-user').value;
    const p = document.getElementById('l-pass').value;
    try {
      const form = new URLSearchParams({ username: u, password: p });
      const res = await call('/users/login', 'POST', form, true);
      token = res.access_token;
      localStorage.setItem('todo_token', token);
      localStorage.setItem('todo_user', u);
      startApp();
    } catch(e) { alert(e.message); }
  }

  async function handleRegister() {
    const body = {
      first_name: document.getElementById('r-first').value,
      last_name: " ",
      username: document.getElementById('r-user').value,
      password: document.getElementById('r-pass').value
    };
    try {
      await call('/users/', 'POST', body);
      alert("Tayyor! Endi kiring.");
      toggleAuth(false);
    } catch(e) { alert(e.message); }
  }

  function startApp() {
    document.getElementById('auth-screen').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    document.getElementById('user-display').innerText = localStorage.getItem('todo_user');
    loadTodos();
  }

  async function loadTodos() {
    try {
      const todos = await call('/todos/');
      const container = document.getElementById('todo-list');
      container.innerHTML = todos.map(t => `
        <div class="todo-card">
          <div class="prio-line ${t.priority}"></div>
          <div style="flex:1">
            <div style="font-weight:600; ${t.is_completed ? 'text-decoration:line-through; opacity:0.5' : ''}">${t.name}</div>
            <span class="time-tag">🕒 Yaratildi: ${formatTime(t.created_at)}</span>
            ${t.deadline ? `<span class="deadline-tag">📅 Muddat: ${t.deadline}</span>` : ''}
          </div>
          <div style="display:flex; gap:10px">
            <input type="checkbox" ${t.is_completed ? 'checked' : ''} onchange="toggleTodo(${t.id}, ${t.is_completed})">
            <button onclick="delTodo(${t.id})" style="background:none; border:none; color:var(--red)">🗑️</button>
          </div>
        </div>
      `).join('');
    } catch(e) { console.error(e); }
  }

  async function addTodo() {
    const body = {
      name: document.getElementById('t-name').value,
      priority: document.getElementById('t-prio').value,
      deadline: document.getElementById('t-date').value || null,
      is_completed: false
    };
    if (!body.name) return;
    await call('/todos/', 'POST', body);
    document.getElementById('t-name').value = '';
    loadTodos();
  }

  async function toggleTodo(id, currentStatus) {
    const todos = await call('/todos/');
    const t = todos.find(x => x.id === id);
    await call(`/todos/${id}`, 'PUT', { ...t, is_completed: !currentStatus });
    loadTodos();
  }

  async function delTodo(id) {
    if (confirm("O'chirilsinmi?")) {
      await call(`/todos/${id}`, 'DELETE');
      loadTodos();
    }
  }

  function logout() {
    localStorage.clear();
    location.reload();
  }

  if (token) startApp();
</script>
</body>
</html>
