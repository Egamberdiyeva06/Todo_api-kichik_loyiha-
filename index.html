<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FastAPI Todo Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .done { text-decoration: line-through; color: #033883; }
        .toast { transform: translateX(150%); transition: transform 0.3s ease; }
        .toast.show { transform: translateX(0); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <div id="toast" class="fixed top-5 right-5 toast bg-white border-l-4 p-4 shadow-lg rounded z-50">
        <p id="toast-msg" class="text-sm font-bold"></p>
    </div>

    <div id="auth-box" class="flex items-center justify-center min-h-screen">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-slate-100">
            <h2 id="auth-title" class="text-3xl font-extrabold text-slate-800 text-center mb-2">Xush kelibsiz</h2>
            <p id="auth-subtitle" class="text-slate-500 text-center mb-8">Tizimga kirish uchun ma'lumotlarni kiriting</p>
            
            <div class="space-y-4">
                <div id="reg-inputs" class="hidden space-y-4">
                    <input type="text" id="first_name" placeholder="Ism" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition">
                    <input type="text" id="last_name" placeholder="Familiya" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition">
                </div>
                <input type="text" id="username" placeholder="Username" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition">
                <input type="password" id="password" placeholder="Parol" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition">

                <button id="auth-btn" onclick="authAction()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 shadow-lg shadow-blue-200 transition">Kirish</button>
                
                <p class="text-center text-sm text-slate-500 mt-4">
                    <span id="toggle-hint">Hisobingiz yo'qmi?</span>
                    <button onclick="toggleAuth()" class="text-blue-600 font-bold hover:underline">Ro'yxatdan o'ting</button>
                </p>
            </div>
        </div>
    </div>

    <div id="app-box" class="hidden container mx-auto max-w-4xl px-4 py-10">
        <div class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
            <div>
                <h1 class="text-3xl font-black text-slate-800 tracking-tight">Mening Vazifalarim</h1>
                <p class="text-slate-500">Bugun bajarilishi kerak bo'lgan ishlar</p>
            </div>
            <button onclick="logout()" class="bg-white text-red-500 border border-red-100 px-6 py-2 rounded-xl hover:bg-red-50 font-bold transition">
                <i class="fas fa-power-off mr-2"></i>Chiqish
            </button>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 mb-8">
            <div class="grid grid-cols-1 md:grid-cols-5 gap-3">
                <div class="md:col-span-2">
                    <input type="text" id="todo-name" placeholder="Vazifa nomi..." class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-green-500 outline-none">
                </div>
                <div class="md:col-span-2">
                    <input type="text" id="todo-desc" placeholder="Qisqacha tavsif..." class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-green-500 outline-none">
                </div>
                <button onclick="addTodo()" class="bg-green-500 text-white p-3 rounded-xl font-bold hover:bg-green-600 transition">
                    <i class="fas fa-plus"></i> Qo'shish
                </button>
            </div>
        </div>

        <div id="todo-list" class="space-y-4">
            </div>
    </div>

    <div id="edit-modal" class="fixed inset-0 bg-slate-900/50 flex items-center justify-center hidden z-40 backdrop-blur-sm">
        <div class="bg-white p-8 rounded-2xl w-full max-w-md shadow-2xl">
            <h3 class="text-xl font-bold mb-6 text-slate-800">Vazifani tahrirlash</h3>
            <input type="hidden" id="edit-id">
            <div class="space-y-4">
                <input type="text" id="edit-name" class="w-full p-3 border border-slate-200 rounded-xl outline-none">
                <textarea id="edit-desc" class="w-full p-3 border border-slate-200 rounded-xl outline-none" rows="3"></textarea>
                <div class="flex items-center gap-2 px-2">
                    <input type="checkbox" id="edit-completed" class="w-5 h-5 rounded border-slate-300">
                    <label for="edit-completed" class="text-slate-700 font-medium">Bajarildi</label>
                </div>
                <div class="flex gap-3 mt-6">
                    <button onclick="closeModal()" class="flex-1 py-3 bg-slate-100 rounded-xl font-bold hover:bg-slate-200">Bekor qilish</button>
                    <button onclick="saveEdit()" class="flex-1 py-3 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700">Saqlash</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const BASE_URL = "http://127.0.0.1:8000/api";
        let token = localStorage.getItem("token");
        let isLoginMode = true;

        // Sahifa yuklanganda holatni tekshirish
        window.onload = () => {
            if (token) showApp();
        };

        function toggleAuth() {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-title').innerText = isLoginMode ? "Xush kelibsiz" : "Ro'yxatdan o'tish";
            document.getElementById('reg-inputs').classList.toggle('hidden');
            document.getElementById('auth-btn').innerText = isLoginMode ? "Kirish" : "Ro'yxatdan o'tish";
            document.getElementById('toggle-hint').innerText = isLoginMode ? "Hisobingiz yo'qmi?" : "Hisobingiz bormi?";
        }

        async function authAction() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                if (isLoginMode) {
                    // Login mantiqi
                    const body = new URLSearchParams();
                    body.append('username', username);
                    body.append('password', password);

                    const res = await fetch(`${BASE_URL}/users/login`, {
                        method: 'POST',
                        body: body
                    });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.detail || "Xatolik yuz berdi");

                    localStorage.setItem("token", data.access_token);
                    token = data.access_token;
                    notify("Muvaffaqiyatli kirdingiz!", "border-green-500 text-green-600");
                    showApp();
                } else {
                    // Ro'yxatdan o'tish
                    const res = await fetch(`${BASE_URL}/users/`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            username, password,
                            first_name: document.getElementById('first_name').value,
                            last_name: document.getElementById('last_name').value
                        })
                    });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.detail || "Ro'yxatdan o'tishda xato");

                    notify("Ro'yxatdan o'tildi! Endi kiring.", "border-blue-500 text-blue-600");
                    toggleAuth();
                }
            } catch (err) {
                notify(err.message, "border-red-500 text-red-600");
            }
        }

        async function loadTodos() {
            const res = await fetch(`${BASE_URL}/todos/`, {
                headers: {'Authorization': `Bearer ${token}`}
            });
            if (res.status === 401) logout();
            const todos = await res.json();
            const container = document.getElementById('todo-list');
            
            if (todos.length === 0) {
                container.innerHTML = `<div class="text-center py-20 text-slate-400">Hozircha vazifalar yo'q.</div>`;
                return;
            }

            container.innerHTML = todos.map(t => `
                <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 flex items-center justify-between group hover:shadow-md transition">
                    <div class="flex-1">
                        <h4 class="font-bold text-slate-800 ${t.is_completed ? 'done' : ''}">${t.name}</h4>
                        <p class="text-slate-500 text-sm">${t.description || ''}</p>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="openEdit(${t.id}, '${t.name}', '${t.description}', ${t.is_completed})" class="p-2 text-slate-400 hover:text-blue-500 hover:bg-blue-50 rounded-lg transition"><i class="fas fa-pen"></i></button>
                        <button onclick="deleteTodo(${t.id})" class="p-2 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition"><i class="fas fa-trash-alt"></i></button>
                    </div>
                </div>
            `).join('');
        }

        async function addTodo() {
            const name = document.getElementById('todo-name').value;
            const description = document.getElementById('todo-desc').value;
            if (!name) return notify("Nomini kiriting!", "border-orange-500 text-orange-600");

            const res = await fetch(`${BASE_URL}/todos/`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ name, description })
            });

            if (res.ok) {
                document.getElementById('todo-name').value = '';
                document.getElementById('todo-desc').value = '';
                loadTodos();
                notify("Vazifa qo'shildi", "border-green-500 text-green-600");
            }
        }

        async function deleteTodo(id) {
            if (!confirm("O'chirilsinmi?")) return;
            const res = await fetch(`${BASE_URL}/todos/${id}`, {
                method: 'DELETE',
                headers: {'Authorization': `Bearer ${token}`}
            });
            if (res.ok) {
                loadTodos();
                notify("Vazifa o'chirildi", "border-red-500 text-red-600");
            }
        }

        function openEdit(id, name, desc, completed) {
            document.getElementById('edit-id').value = id;
            document.getElementById('edit-name').value = name;
            document.getElementById('edit-desc').value = desc;
            document.getElementById('edit-completed').checked = completed;
            document.getElementById('edit-modal').classList.remove('hidden');
        }

        async function saveEdit() {
            const id = document.getElementById('edit-id').value;
            const body = {
                name: document.getElementById('edit-name').value,
                description: document.getElementById('edit-desc').value,
                is_completed: document.getElementById('edit-completed').checked
            };

            const res = await fetch(`${BASE_URL}/todos/${id}`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify(body)
            });

            if (res.ok) {
                closeModal();
                loadTodos();
                notify("Yangilandi", "border-blue-500 text-blue-600");
            }
        }

        function showApp() {
            document.getElementById('auth-box').classList.add('hidden');
            document.getElementById('app-box').classList.remove('hidden');
            loadTodos();
        }

        function logout() {
            localStorage.removeItem("token");
            window.location.reload();
        }

        function closeModal() {
            document.getElementById('edit-modal').classList.add('hidden');
        }

        function notify(msg, colorClass) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            toast.className = `fixed top-5 right-5 toast bg-white border-l-4 p-4 shadow-lg rounded z-50 show ${colorClass}`;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
    </script>
</body>
</html>
